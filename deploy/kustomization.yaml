apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply with:  kubectl apply -k deploy/
# The Secret is intentionally excluded — create it out-of-band from
# secret.example.yaml so real credentials are never committed.
namespace: finchat

# Central image mapping. CI (.github/workflows/build-push.yml) pushes to GHCR;
# point these at your repo owner and pin newTag to an immutable tag (a git SHA
# or a released vX.Y.Z) for reproducible rollouts instead of :latest.
images:
  - name: finchat-backend
    newName: ghcr.io/alonespace/smc-financial-ai-assistant-backend
    newTag: latest
  - name: finchat-frontend
    newName: ghcr.io/alonespace/smc-financial-ai-assistant-frontend
    newTag: latest

resources:
  - namespace.yaml
  - configmap.yaml
  - postgres/pvc.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - redis/deployment.yaml
  - redis/service.yaml
  - backend/deployment.yaml
  - backend/service.yaml
  - frontend/deployment.yaml
  - frontend/service.yaml
  - ingress.yaml
  - cert-issuer.yaml
  - secret.yaml
