apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: finchat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # Pull the GHCR image published by .github/workflows/build-push.yml.
      # Omit if you import images directly into k3s (see deploy/README.md).
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: frontend
          # Image + tag are set centrally in kustomization.yaml (images:).
          image: ghcr.io/alonespace/smc-financial-ai-assistant-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
