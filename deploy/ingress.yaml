# Traefik IngressRoute (k3s ships Traefik by default).
# Routes /api → backend (NestJS keeps its own /api prefix, no stripping),
# everything else → frontend SPA. Traefik streams SSE natively.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: finchat-ingress
  namespace: finchat
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`finchat.local`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: backend
          port: 3000
    - match: Host(`finchat.local`)
      kind: Rule
      services:
        - name: frontend
          port: 80
