apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: finchat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Pull the GHCR image published by .github/workflows/build-push.yml.
      # Omit if you import images directly into k3s (see deploy/README.md).
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: backend
          # Image + tag are set centrally in kustomization.yaml (images:).
          image: ghcr.io/alonespace/smc-financial-ai-assistant-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: finchat-config
            - secretRef:
                name: finchat-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
