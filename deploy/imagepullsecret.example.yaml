# TEMPLATE ONLY — never commit a real .dockerconfigjson.
#
# GHCR packages are PRIVATE by default, so the cluster needs credentials to pull
# the images published by .github/workflows/build-push.yml. The backend and
# frontend Deployments reference this Secret via `imagePullSecrets: ghcr-pull-secret`.
#
# Prefer creating it out-of-band (kept out of git, like finchat-secret):
#
# kubectl create secret docker-registry ghcr-pull-secret \
#   --namespace finchat \
#   --docker-server=ghcr.io \
#   --docker-username=<github-username> \
#   --docker-password=<GHCR_PAT_with_read:packages> \
#   --docker-email=<you@example.com>
#
# Use a fine-grained PAT / classic token with the `read:packages` scope only.
# (Or make the two GHCR packages public in the repo's Packages settings and drop
#  the imagePullSecrets entirely.)
#
# This YAML is provided only to show the resulting shape.
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: finchat
type: kubernetes.io/dockerconfigjson
data:
  # base64 of: {"auths":{"ghcr.io":{"auth":"<base64 user:token>"}}}
  .dockerconfigjson: REPLACE_WITH_BASE64_DOCKERCONFIGJSON
