# TEMPLATE ONLY — never commit real secrets.
# Copy to secret.yaml, replace the placeholders, and apply separately.
# `stringData` lets you paste plaintext; Kubernetes base64-encodes it.
apiVersion: v1
kind: Secret
metadata:
  name: finchat-secret
  namespace: finchat
type: Opaque
stringData:
  # PostgreSQL
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
  POSTGRES_DB: "finchat"
  DATABASE_URL: "postgresql://postgres:REPLACE_WITH_STRONG_PASSWORD@postgres:5432/finchat"
  # Redis
  REDIS_URL: "redis://redis:6379"
  # Auth — must be at least 32 characters
  JWT_SECRET: "REPLACE_WITH_RANDOM_STRING_MIN_32_CHARS"
  # AI provider keys — only the one matching AI_PROVIDER must be set.
  OPENAI_API_KEY: "sk-REPLACE_ME"
  ANTHROPIC_API_KEY: "sk-ant-REPLACE_ME"
